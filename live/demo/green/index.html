<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>정 Process v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&family=Noto+Sans+Thai:wght@300;400;500&family=Noto+Sans+Arabic:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* Force system color emoji over Noto Sans web fonts for emoji codepoints */
@font-face { font-family: 'Noto Sans KR'; src: local('Apple Color Emoji'), local('Segoe UI Emoji'), local('Noto Color Emoji'); unicode-range: U+200D, U+2600-27BF, U+2934-2935, U+2B05-2B07, U+2B1B-2B1C, U+2B50, U+2B55, U+FE0F, U+1F000-1FFFF; }
@font-face { font-family: 'Noto Sans Thai'; src: local('Apple Color Emoji'), local('Segoe UI Emoji'), local('Noto Color Emoji'); unicode-range: U+200D, U+2600-27BF, U+2934-2935, U+2B05-2B07, U+2B1B-2B1C, U+2B50, U+2B55, U+FE0F, U+1F000-1FFFF; }
@font-face { font-family: 'Noto Sans Arabic'; src: local('Apple Color Emoji'), local('Segoe UI Emoji'), local('Noto Color Emoji'); unicode-range: U+200D, U+2600-27BF, U+2934-2935, U+2B05-2B07, U+2B1B-2B1C, U+2B50, U+2B55, U+FE0F, U+1F000-1FFFF; }
@font-face { font-family: 'Noto Sans JP'; src: local('Apple Color Emoji'), local('Segoe UI Emoji'), local('Noto Color Emoji'); unicode-range: U+200D, U+2600-27BF, U+2934-2935, U+2B05-2B07, U+2B1B-2B1C, U+2B50, U+2B55, U+FE0F, U+1F000-1FFFF; }
@font-face { font-family: 'Noto Sans SC'; src: local('Apple Color Emoji'), local('Segoe UI Emoji'), local('Noto Color Emoji'); unicode-range: U+200D, U+2600-27BF, U+2934-2935, U+2B05-2B07, U+2B1B-2B1C, U+2B50, U+2B55, U+FE0F, U+1F000-1FFFF; }

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #08080a;
  --bg-chat: #0e0e12;
  --bubble-bot: #16161c;
  --bubble-user: rgba(233,69,96,0.07);
  --bubble-user-border: rgba(233,69,96,0.12);
  --text: #d8d4ce;
  --text-muted: rgba(216,212,206,0.42);
  --text-dim: rgba(216,212,206,0.18);
  --text-sys: rgba(216,212,206,0.28);
  --accent: #e94560;
  --accent-soft: rgba(233,69,96,0.15);
  --accent-glow: rgba(233,69,96,0.06);
  --green: #4ecdc4;
  --green-dim: rgba(78,205,196,0.12);
  --serif: 'DM Serif Display', 'Noto Sans KR', 'Noto Sans Thai', 'Noto Sans Arabic', 'Noto Sans JP', 'Noto Sans SC', 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', Georgia, serif;
  --mono: 'JetBrains Mono', 'Noto Sans KR', 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', monospace;
  --sans: 'Noto Sans KR', 'Noto Sans Thai', 'Noto Sans Arabic', 'Noto Sans JP', 'Noto Sans SC', 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', -apple-system, BlinkMacSystemFont, sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

/* ── Film grain ── */
body::after {
  content: '';
  position: fixed; inset: 0;
  opacity: 0.028;
  pointer-events: none;
  z-index: 10000;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-repeat: repeat;
}

/* ── Tree tabs ── */
.tree-tabs {
  position: sticky; top: 0; z-index: 100;
  display: none;
  gap: 6px;
  justify-content: center;
  padding: 14px 16px 10px;
  background: linear-gradient(var(--bg) 60%, transparent);
}
.tree-tabs.visible { display: flex; }
.tree-tab {
  padding: 4px 14px;
  font-size: 10px;
  font-family: var(--mono);
  font-weight: 400;
  letter-spacing: 1px;
  border-radius: 16px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.06);
  transition: all 0.35s ease;
}
.tree-tab.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* ── Chat feed ── */
.chat-feed {
  max-width: 440px;
  margin: 0 auto;
  padding: 0 12px 160px;
  display: flex;
  flex-direction: column;
  transition: opacity 0.5s ease;
}

/* ── No data ── */
.no-data {
  display: flex; align-items: center; justify-content: center;
  height: 85vh; flex-direction: column; gap: 20px;
}

#noData { opacity: 0; animation: noDataAppear 0.35s ease 0.5s forwards; }
@keyframes noDataAppear { to { opacity: 1; } }

.no-data-glyph {
  font-size: 36px;
  opacity: 0.15;
  animation: breathe 4s ease-in-out infinite;
}
.no-data-title {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 400;
  font-style: italic;
  color: var(--text-muted);
  letter-spacing: 0.5px;
}
.no-data-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 1.5px;
}

/* ── Mission intro ── */
.mission-intro {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 24px 40px;
  text-align: center;
  opacity: 0;
}
.mission-intro.reveal {
  animation: missionIn 1.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
@keyframes missionIn {
  0% { opacity: 0; transform: translateY(20px) scale(0.96); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
.mission-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 20px;
}
.mission-quote {
  font-family: var(--serif);
  font-size: 22px;
  font-style: italic;
  color: var(--text);
  line-height: 1.6;
  max-width: 340px;
  position: relative;
}
.mission-quote::before { content: '\201C'; }
.mission-quote::after { content: '\201D'; }
.mission-quote .mq-green {
  color: #5bba6f;
}
.mission-meta {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 20px;
  letter-spacing: 1px;
}
.mission-schedule {
  margin-top: 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px 12px;
  justify-content: center;
  max-width: 360px;
}
.mission-schedule .sched-row {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.5px;
  color: var(--text);
  white-space: nowrap;
}

/* ── System divider ── */
.sys-divider {
  text-align: center;
  padding: 28px 0 20px;
  opacity: 0;
  transform: translateY(8px);
}
.sys-divider.show { animation: msgIn 0.5s ease forwards; }
.sys-divider-line {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--text-dim), transparent);
  margin-bottom: 12px;
}
.sys-divider-text {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-sys);
}

/* ── Message bubbles ── */
.msg {
  max-width: 82%;
  padding: 10px 14px;
  margin: 3px 0;
  font-size: 13px;
  line-height: 1.6;
  overflow-wrap: anywhere;
  opacity: 0;
  transform: translateY(10px);
  position: relative;
}
.msg.show { animation: msgIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
@keyframes msgIn {
  to { opacity: 1; transform: translateY(0); }
}

/* Bot messages — left */
.msg.bot {
  align-self: flex-start;
  background: var(--bubble-bot);
  border-radius: 2px 14px 14px 14px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 300;
  color: var(--text-muted);
  letter-spacing: 0.2px;
}
.msg.bot .bot-icon {
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 4px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* User messages — right */
.msg.user {
  align-self: flex-end;
  background: var(--bubble-user);
  border: 1px solid var(--bubble-user-border);
  border-radius: 14px 2px 14px 14px;
  color: var(--text);
  font-family: var(--serif);
}

/* Caption message — serif italic */
.msg.caption-msg {
  font-family: var(--serif);
  font-size: 16px;
  font-style: italic;
  line-height: 1.65;
  color: rgba(216,212,206,0.85);
  letter-spacing: 0.3px;
}
.msg.caption-msg .type-cursor {
  color: var(--accent);
  font-family: var(--mono);
  font-weight: 300;
  animation: cursorBlink 0.7s step-end infinite;
  margin-left: 1px;
}
.msg.caption-msg .type-cursor.fade-out {
  animation: none;
  opacity: 0;
  transition: opacity 0.25s;
}
@keyframes cursorBlink {
  50% { opacity: 0; }
}

/* Photo message */
.msg.photo-msg {
  padding: 0;
  overflow: hidden;
  max-width: 72%;
  background: transparent;
  border: none;
}
.msg.photo-msg.bot { border-radius: 2px 14px 14px 14px; }
.msg.photo-msg.user { border-radius: 14px 2px 14px 14px; }

.photo-wrap {
  position: relative;
  overflow: hidden;
  background: #0c0c10;
}
.photo-wrap img {
  width: 100%;
  display: block;
  filter: blur(20px) brightness(0.2);
  transform: scale(1.08);
  transition: filter 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              transform 2.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.photo-wrap img.developed {
  filter: blur(0) brightness(1);
  transform: scale(1);
}
/* Vignette */
.photo-wrap::after {
  content: '';
  position: absolute; inset: 0;
  box-shadow: inset 0 0 50px rgba(0,0,0,0.4);
  pointer-events: none;
}
/* Shimmer scan line */
.photo-wrap.shimmer::before {
  content: '';
  position: absolute; inset: 0;
  z-index: 2;
  background: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
  animation: shimmerScan 1.1s linear infinite;
}
@keyframes shimmerScan {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100%); }
}
/* Photo sizing — full image, no crop */
.photo-wrap img { width: 100%; max-height: 60vh; object-fit: contain; }

/* Jungzigi pass message */
.msg.jungzigi-msg {
  border-left: 2px solid var(--green);
  background: var(--green-dim);
  border-radius: 2px 14px 14px 14px;
}
.msg.jungzigi-msg .jz-label {
  font-size: 10px;
  color: var(--green);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.msg.jungzigi-msg .jz-comment {
  font-family: var(--serif);
  font-size: 14px;
  font-style: italic;
  color: var(--text);
  line-height: 1.5;
}

/* Validation "checking" message */
.msg.validating-msg .checking-dots {
  display: inline-flex;
  gap: 3px;
  margin-left: 6px;
  vertical-align: middle;
}
.msg.validating-msg .checking-dots span {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--text-muted);
  display: inline-block;
  animation: dotBounce 1.2s ease-in-out infinite;
}
.msg.validating-msg .checking-dots span:nth-child(2) { animation-delay: 0.15s; }
.msg.validating-msg .checking-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes dotBounce {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1.2); }
}

/* Mission buttons mock */
.mission-buttons {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-top: 10px;
}
.mission-btn {
  padding: 8px 12px;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  text-align: center;
  transition: all 0.5s ease;
}
.mission-btn.selected {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}

/* Action buttons (Write/Skip) mock */
.action-buttons {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.action-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 16px;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  text-align: center;
  white-space: nowrap;
  transition: all 0.5s ease;
}
.action-btn .btn-icon { font-size: 18px; }
.action-btn .btn-text { font-size: 11px; }
.action-btn.selected {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}

/* Typing indicator (bot thinking) */
.msg.typing-msg {
  padding: 12px 16px;
}
.typing-dots {
  display: flex; gap: 5px;
}
.typing-dots span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--text-muted);
  animation: dotBounce 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.typing-dots span:nth-child(3) { animation-delay: 0.3s; }

/* ── Handoff transition ── */
.handoff {
  text-align: center;
  padding: 36px 20px 28px;
  opacity: 0;
  transform: scale(0.97);
}
.handoff.show {
  animation: handoffIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
@keyframes handoffIn {
  to { opacity: 1; transform: scale(1); }
}
.handoff-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 14px;
}
.handoff-cities {
  font-family: var(--serif);
  font-size: 20px;
  font-style: italic;
  color: var(--text);
  line-height: 1.4;
}
.handoff-arrow {
  display: inline-block;
  margin: 0 12px;
  color: var(--accent);
  font-style: normal;
  opacity: 0;
  animation: arrowPulse 0.6s 0.3s ease forwards;
}
@keyframes arrowPulse {
  0% { opacity: 0; transform: translateX(-6px); }
  100% { opacity: 1; transform: translateX(0); }
}
.handoff-slot {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 10px;
  letter-spacing: 1px;
}
.handoff-route {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 8px;
  letter-spacing: 1px;
  line-height: 1.6;
}

/* Fork divider */
.fork-divider {
  text-align: center;
  padding: 20px 0 16px;
  opacity: 0;
}
.fork-divider.show { animation: msgIn 0.5s ease forwards; }
.fork-divider-text {
  font-family: var(--serif);
  font-size: 13px;
  font-style: italic;
  color: var(--text-muted);
}
.fork-badge {
  display: inline-block;
  font-family: var(--mono);
  font-size: 8px;
  font-style: normal;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--accent);
  border: 1px solid rgba(233,69,96,0.2);
  border-radius: 2px;
  padding: 1px 6px;
  margin-left: 6px;
  vertical-align: 2px;
}

/* ── Sender label (above user messages) ── */
.sender-label {
  align-self: flex-end;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.8px;
  margin: 12px 0 4px;
  opacity: 0;
}
.sender-label.show { animation: msgIn 0.4s ease forwards; }

/* Bot label (above bot messages) */
.bot-label {
  align-self: flex-start;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.8px;
  margin: 12px 0 4px;
  opacity: 0;
}
.bot-label.show { animation: msgIn 0.4s ease forwards; }

/* ── End indicator ── */
.end-indicator {
  text-align: center;
  padding: 48px 0 24px;
  opacity: 0;
  animation: fadeIn 1s 0.4s forwards;
}
.end-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  margin: 0 auto 16px;
  animation: breathe 3.5s ease-in-out infinite;
}
.end-text {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

/* ── Arrival card (previous person's block, full width) ── */
.arrival-card {
  margin: 6px 0;
  padding: 14px;
  background: var(--bubble-bot);
  border-radius: 4px 14px 14px 14px;
  border-left: 2px solid var(--accent);
  opacity: 0;
  transform: translateY(10px);
}
.arrival-card.show { animation: msgIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
.arrival-card-sender {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.8px;
  margin-bottom: 10px;
}
.arrival-card-photo {
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 10px;
}
.arrival-card-photo img {
  width: 100%;
  display: block;
}
.arrival-card-caption {
  font-family: var(--serif);
  font-size: 15px;
  font-style: italic;
  color: rgba(216,212,206,0.75);
  line-height: 1.6;
}

/* ── Keyframes ── */
@keyframes breathe {
  0%, 100% { opacity: 0.2; transform: scale(0.7); }
  50% { opacity: 0.9; transform: scale(1.1); }
}
@keyframes fadeIn { to { opacity: 1; } }

/* ── Scroll button ── */
.scroll-btn {
  position: fixed; bottom: 28px; right: 20px;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(233,69,96,0.6);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(233,69,96,0.3);
  color: #fff;
  font-size: 13px;
  cursor: pointer;
  display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  z-index: 90;
  transition: all 0.3s ease;
}
.scroll-btn.visible { display: flex; }
.scroll-btn:active { transform: scale(0.9); }

/* ── User typing indicator ── */
.msg.user-typing-msg {
  padding: 12px 16px;
  background: var(--bubble-user);
  border: 1px solid var(--bubble-user-border);
}
.user-typing-dots {
  display: flex; gap: 4px;
}
.user-typing-dots span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.5;
  animation: userTypePulse 1.4s ease-in-out infinite;
}
.user-typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.user-typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes userTypePulse {
  0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
  40% { opacity: 0.7; transform: scale(1.15); }
}

/* ── User action tap (inline keyboard button) ── */
.msg.user-tap {
  background: rgba(233,69,96,0.12);
  border: 1px solid rgba(233,69,96,0.25);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.5px;
  color: var(--accent);
  padding: 10px 18px;
  text-align: center;
}

/* ── Responsive ── */
@media (max-width: 440px) {
  .chat-feed { padding: 0 8px 140px; }
  .msg { font-size: 12px; max-width: 86%; }
  .msg.caption-msg { font-size: 15px; }
  .msg.photo-msg { max-width: 78%; }
  .mission-quote { font-size: 19px; }
  .handoff-cities { font-size: 18px; }
}
</style>
</head>
<body>

<div class="tree-tabs" id="treeTabs"></div>

<div class="chat-feed" id="feed">
  <div class="no-data" id="noData">
    <div class="no-data-glyph">정(情)</div>
    <div class="no-data-title">Process View</div>
    <div class="no-data-sub">waiting for relay data</div>
  </div>
</div>


<script>
(function() {

      relay_confirm: '\u2705 {slot}/{total} \u00B7 \u0627\u06AF\u0644\u06D2 \u0679\u0627\u0626\u0645 \u0632\u0648\u0646 \u06A9\u06CC \u0637\u0631\u0641\u2026',
      meanwhile: '\u0627\u0633 \u062F\u0648\u0631\u0627\u0646 {flag} {city} \u0645\u06CC\u06BA\u2026',
      waiting: '\u0627\u06AF\u0644\u06D2 \u0634\u06C1\u0631 \u06A9\u0627 \u0627\u0646\u062A\u0638\u0627\u0631\u2026'
    }
  };

  function botT(key, lang, params) {
    var msgs = BOT_I18N[lang] || BOT_I18N.en;
    var s = msgs[key] || BOT_I18N.en[key] || key;
    if (params) {
      Object.keys(params).forEach(function(k) {
        s = s.split('{' + k + '}').join(params[k]);
      });
    }
    return s;
  }

  function getJZ(lang) {
    return JZ_I18N[lang] || JZ_I18N.en;
  }
  var KW = {
    food: ['lunch','food','eat','coffee','cook','rice','soup','meal','dinner','breakfast','hungry','delicious','plate','kitchen','recipe','spicy','chili','pepper','tea','bread','noodle','\u98DF','\u98EF','\u6599\u7406','\u5348\u98EF','\u304A\u3044\u3057','\u98F2','\u7F8E\u5473','\u8089','\u83DC','\u7C73','\u6C34\u716E','\u5403','\u5580\u5561','\u0E02\u0E49\u0E32\u0E27','\u0E2D\u0E32\u0E2B\u0E32\u0E23','\u0E01\u0E34\u0E19','\u0E40\u0E1C\u0E47\u0E14','\u0E1E\u0E23\u0E34\u0E01','\u0E2A\u0E49\u0E21\u0E15\u0E33','\uBC25','\uCEE4\uD53C','\uC74C\uC2DD','\uB9C8\uC2DC','\uBA39'],
    nature: ['green','tree','leaf','plant','garden','flower','sea','wave','ocean','water','sky','cloud','sun','sunrise','sunset','mountain','forest','grass','moss','aloe','lettuce','shore','tide','reef','\u7DD1','\u6D77','\u82B1','\u6728','\u5C71','\u6CB3','\u8349','\u690D\u7269','\u6C34','\u7A7A','\u96F2','\u85FB','\u521D\u65E5','\u8CBF\u6613\u98A8','\u0E17\u0E30\u0E40\u0E25','\u0E15\u0E49\u0E19\u0E44\u0E21\u0E49','\u0E14\u0E2D\u0E01\u0E44\u0E21\u0E49','\u0E2A\u0E35\u0E40\u0E02\u0E35\u0E22\u0E27','\uBC14\uB2E4','\uD558\uB298','\uB098\uBB34','\uAF43','\uCD08\uB85D'],
    city: ['city','street','sidewalk','building','urban','traffic','neon','concrete','pavement','road','station','pedestrian','bus','train','cafe','window','door','sign','block','corner','\u901A\u308A','\u9053','\u99C5','\u30AB\u30D5\u30A7','\u5E02','\u8857','\u8DEF','\u0E16\u0E19\u0E19','\u0E40\u0E21\u0E37\u0E2D\u0E07','\uAC70\uB9AC','\uCE74\uD398','\uB3C4\uC2DC']
  };

  function jungzigiComment(block, lang) {
    var c = (block.caption || '').toLowerCase();
    var cat = 'fallback';
    var keys = Object.keys(KW);
    for (var ki = 0; ki < keys.length; ki++) {
      var arr = KW[keys[ki]];
      for (var wi = 0; wi < arr.length; wi++) {
        if (c.indexOf(arr[wi].toLowerCase()) >= 0) { cat = keys[ki]; break; }
      }
      if (cat !== 'fallback') break;
    }
    // Check for object-related words
    if (cat === 'fallback') {
      var objWords = ['old','worn','dent','scar','stain','year','decade','broke','fix','patch','tool','bag','pack','boot','jacket','mat','thermos','eraser','rubber'];
      for (var oi = 0; oi < objWords.length; oi++) {
        if (c.indexOf(objWords[oi]) >= 0) { cat = 'object'; break; }
      }
    }
    var jz = getJZ(lang || 'en');
    var pool = jz[cat] || jz.fallback;
    var hash = ((block.slotIndex || 1) * 31 + (block.chainId || 0)) % pool.length;
    return pool[Math.abs(hash)];
  }

  /* ══════════════════════════════════════════════

  var feed;

  function photoMsg(photoPath, side, isPortrait) {

  function handoff(fromFlag, fromCity, toFlag, toCity, slot) {

      ? routeFlags.map(function(r) { return r.flag; }).join(' \u2192 ')
      : '';

  /* ══════════════════════════════════════════════
     Typewriter Effect
     ══════════════════════════════════════════════ */
  function typeText(msgEl, text, cb) {
    var span = msgEl.querySelector('.type-target') || msgEl;
    var cursor = document.createElement('span');
    cursor.className = 'type-cursor';
    cursor.textContent = '\u258C';
    span.textContent = '';
    span.appendChild(cursor);

    var chars = [];
    var arr = Array.from(text);
    for (var ci = 0; ci < arr.length; ci++) {
      var cp = arr[ci].codePointAt(0);
      if (cp >= 0x1F1E6 && cp <= 0x1F1FF && ci + 1 < arr.length) {
        var cp2 = arr[ci + 1].codePointAt(0);
        if (cp2 >= 0x1F1E6 && cp2 <= 0x1F1FF) { chars.push(arr[ci] + arr[ci + 1]); ci++; continue; }
      }
      chars.push(arr[ci]);
    }
    var i = 0;
    var speed = Math.min(T.CAPTION_CHAR, Math.floor(T.CAPTION_MAX / Math.max(chars.length, 1)));

    function tick() {
      if (i < chars.length) {
        span.insertBefore(document.createTextNode(chars[i]), cursor);
        i++;
        setTimeout(tick, speed);
      } else {
        cursor.classList.add('fade-out');
        setTimeout(function() {
          if (cursor.parentNode) cursor.parentNode.removeChild(cursor);
          if (cb) cb();
        }, 250);
      }
    }
    tick();
  }

  /* ══════════════════════════════════════════════
     Step Sequencer
     ══════════════════════════════════════════════ */
  function playSequence(steps, cb) {
    var i = 0;
    function next() {
      if (i >= steps.length) { if (cb) cb(); return; }
      var step = steps[i++];
      step.run(function() {
        setTimeout(next, step.wait || 0);
      });
    }
    next();
  }

  /* ══════════════════════════════════════════════
     Build Steps: Slot 1 (Origin / New Chain)
     ══════════════════════════════════════════════ */
  function buildScheduleHtml() {
    var h = currentStartHour % 12 || 12;
    var ampm = currentStartHour < 12 ? 'AM' : 'PM';
    var timeStr = h + ':00 ' + ampm;
    return '<div class="mission-schedule">' +
      '<span class="sched-row">Delivery \u00B7 ' + timeStr + ' local time</span>' +
      '</div>';
  }

  function buildOriginSteps(block, mission, slotGroups) {
    var steps = [];

    // 0. City divider
    steps.push({ wait: T.BETWEEN_MSG, run: function(done) {
      var divider = sysDivider(block.flag + ' ' + esc(block.city));
      showEl(divider, 10);
      autoScroll(divider);
      done();
    }});

    // 1. Sender label
    steps.push({ wait: T.SENDER_LABEL, run: function(done) {
      var lbl = senderLabel(block.firstName, block.flag, block.city);
      showEl(lbl, 10);
      autoScroll(lbl);
      done();
    }});

    // 2. User taps "정 만들기" button
    steps.push({ wait: T.BETWEEN_MSG * 2, run: function(done) {
      var tap = userMsg(botT('start_new', block.lang), 'user-tap');
      showEl(tap, 10);
      autoScroll(tap);
      done();
    }});

    // 3. Bot responds: ready to create, send a photo
    var typingEl;
    steps.push({ wait: T.TYPING_SHOW, run: function(done) {
      typingEl = typingIndicator();
      showEl(typingEl, 10);
      autoScroll(typingEl);
      done();
    }});

    steps.push({ wait: T.TYPING_HOLD, run: function(done) {
      typingEl.parentNode.removeChild(typingEl);
      var prompt = botMsg(
        botT('depart_prompt', block.lang, { name: esc(block.firstName), city: esc(block.city) }).replace(/\n/g, '<br>')
      );
      showEl(prompt, 10);
      autoScroll(prompt);
      done();
    }});

    // 4. User "thinking" before taking photo
    var userTyp1;
    steps.push({ wait: T.USER_THINK, run: function(done) {
      userTyp1 = userTypingIndicator();
      showEl(userTyp1, 10);
      autoScroll(userTyp1);
      done();
    }});

    // 5. Photo upload (user side, portrait for origin)
    var photoEl;
    steps.push({ wait: T.USER_THINK, run: function(done) {
      userTyp1.parentNode.removeChild(userTyp1);
      photoEl = photoMsg(block.photoPath, 'user', true);
      showEl(photoEl, 10);
      autoScroll(photoEl);
      done();
    }});

    // 6. Photo develops
    steps.push({ wait: T.PHOTO_DEVELOP, run: function(done) {
      developPhoto(photoEl);
      done();
    }});

    // 7. Bot: photo received, ask caption
    var typingEl2;
    steps.push({ wait: T.TYPING_SHOW, run: function(done) {
      typingEl2 = typingIndicator();
      showEl(typingEl2, 10);
      autoScroll(typingEl2);
      done();
    }});

    steps.push({ wait: T.TYPING_HOLD, run: function(done) {
      typingEl2.parentNode.removeChild(typingEl2);
      var prompt = botMsg(botT('add_caption', block.lang));
      showEl(prompt, 10);
      autoScroll(prompt);
      done();
    }});

    // 8. User "typing" caption indicator
    var userTyp2;
    steps.push({ wait: T.USER_THINK, run: function(done) {
      userTyp2 = userTypingIndicator();
      showEl(userTyp2, 10);
      autoScroll(userTyp2);
      done();
    }});

    // 9. Caption typewriter (user side)
    steps.push({ wait: T.USER_THINK, run: function(done) {
      userTyp2.parentNode.removeChild(userTyp2);
      var capMsg = userMsg('<span class="type-target"></span>', 'caption-msg');
      showEl(capMsg, 10);
      autoScroll(capMsg);
      setTimeout(function() {
        typeText(capMsg, block.caption, done);
      }, 200);
    }});

    // 8. Bot: validating
    var valEl;
    steps.push({ wait: T.BETWEEN_MSG, run: function(done) {
      valEl = botMsg(
        botT('checking', block.lang) +
        '<span class="checking-dots"><span></span><span></span><span></span></span>',
        'validating-msg'
      );
      showEl(valEl, 10);
      autoScroll(valEl);
      done();
    }});

    // 9. Replace with jungzigi pass
    steps.push({ wait: T.VALIDATE_HOLD, run: function(done) {
      valEl.parentNode.removeChild(valEl);
      var jz = botMsg(
        '<div class="jz-label">' + botT('moderator', block.lang) + '</div>' +
        '<div class="jz-comment">' + esc(jungzigiComment(block, block.lang)) + '</div>',
        'jungzigi-msg'
      );
      showEl(jz, 10);
      autoScroll(jz);
      done();
    }});

    // 10. Mission suggestion + buttons
    if (mission) {
      steps.push({ wait: T.MISSION_SHOW, run: function(done) {
        var missionMsg = botMsg(
          botT('mission_suggest', block.lang) +
          '<br><br>\u300C' + esc(mission) + '\u300D' +
          '<div class="mission-buttons">' +
            '<div class="mission-btn" data-idx="0">' + botT('mission_use', block.lang) + '</div>' +
            '<div class="mission-btn" data-idx="1">' + botT('mission_write', block.lang) + '</div>' +
            '<div class="mission-btn" data-idx="2">' + botT('mission_skip', block.lang) + '</div>' +
          '</div>'
        );
        showEl(missionMsg, 10);
        autoScroll(missionMsg);
        // Highlight "Accept" after delay
        setTimeout(function() {
          var btn = missionMsg.querySelector('[data-idx="0"]');
          if (btn) btn.classList.add('selected');
        }, T.MISSION_SELECT);
        setTimeout(done, T.MISSION_SELECT + 200);
      }});

      // 11. Confirmation
      steps.push({ wait: T.CONFIRM_SHOW, run: function(done) {
        var confirm = botMsg(botT('mission_confirm', block.lang, { mission: esc(mission) }));
        showEl(confirm, 10);
        autoScroll(confirm);
        done();
      }});
    }

    // 12. Chain departure
    steps.push({ wait: T.DEPART_SHOW, run: function(done) {
      var depart = botMsg(
        botT('depart', block.lang, { flag: block.flag, city: esc(block.city) })
      );
      showEl(depart, 10);
      autoScroll(depart);
      routeFlags.push({ flag: block.flag, city: block.city });
      done();
    }});

    // 13. Mission reveal interstitial (after everything is set)
    if (mission) {
      steps.push({ wait: T.DEPART_SHOW, run: function(done) {
        var intro = el('div', 'mission-intro',
          '<div class="mission-label">' + botT('mission_label', block.lang) + '</div>' +
          '<div class="mission-quote">' + formatMission(mission) + '</div>' +
          '<div class="mission-meta">' + botT('mission_meta', block.lang, { flag: block.flag, city: esc(block.city) }) + '</div>' +
          buildScheduleHtml(slotGroups)
        );
        addToFeed(intro);
        requestAnimationFrame(function() { intro.classList.add('reveal'); });
        autoScroll(intro);
        done();
      }});
    }

    return steps;
  }

  /* ══════════════════════════════════════════════
     Build Steps: Slot N (Relay)
     ══════════════════════════════════════════════ */
  function buildRelaySteps(block, prevBlock, mission, slotNum) {
    var steps = [];

    // 1. Handoff interstitial
    steps.push({ wait: T.BETWEEN_MSG, run: function(done) {
      var prev = routeFlags[routeFlags.length - 1] || { flag: '', city: '' };
      var h = handoff(prev.flag, prev.city, block.flag, block.city, slotNum);
      showEl(h, 10);
      autoScroll(h);
      routeFlags.push({ flag: block.flag, city: block.city });
      done();
    }});

    // 2. City divider + sender label
    steps.push({ wait: T.HANDOFF_HOLD, run: function(done) {
      var divider = sysDivider(block.flag + ' ' + esc(block.city));
      showEl(divider, 10);

      var lbl = senderLabel(block.firstName, block.flag, block.city);
      showEl(lbl, 10);
      autoScroll(lbl);
      done();
    }});

    // 3. Bot: arrival notification
    steps.push({ wait: T.ARRIVAL_SHOW, run: function(done) {
      var localMission = getMission(block.lang);
      var arrival = botMsg(
        botT('arrived', block.lang, { city: esc(prevBlock ? prevBlock.city : '???'), slot: slotNum }) +
        (localMission ? '<br><span style="font-size:11px;color:var(--text-dim)">' + botT('mission_sub', block.lang, { mission: esc(localMission) }) + '</span>' : '')
      );
      showEl(arrival, 10);
      autoScroll(arrival);

    // 4. Show previous block photo+caption (full width, like Telegram)

      // 5. Write/Skip buttons

      showEl(typingEl, 10);

      if (localMission2) {
        sendText += '<br><br>' + botT('mission_sub', block.lang, { mission: esc(localMission2) });
      }
      var prompt = botMsg(sendText);
      showEl(prompt, 10);
      autoScroll(prompt);

    // 7. User "thinking" before photo

      userTyp1 = userTypingIndicator();
      showEl(userTyp1, 10);
      autoScroll(userTyp1);
      done();

    // 8. Photo upload (user side)
    var photoEl;
    steps.push({ wait: T.USER_THINK, run: function(done) {
      userTyp1.parentNode.removeChild(userTyp1);
      photoEl = photoMsg(block.photoPath, 'user', false);
      showEl(photoEl, 10);
      autoScroll(photoEl);
      done();

    // 9. Photo develops

      showEl(prompt, 10);
      autoScroll(prompt);
      done();

    var userTyp2;
    steps.push({ wait: T.USER_THINK, run: function(done) {
      userTyp2 = userTypingIndicator();
      showEl(userTyp2, 10);
      autoScroll(userTyp2);

      showEl(capMsg, 10);
      autoScroll(capMsg);
      setTimeout(function() {
        typeText(capMsg, block.caption, done);

    // 11. Validating
    var valEl;
    steps.push({ wait: T.BETWEEN_MSG, run: function(done) {
      valEl = botMsg(
        botT('checking', block.lang) +
        '<span class="checking-dots"><span></span><span></span><span></span></span>',
        'validating-msg'
      );
      showEl(valEl, 10);
      autoScroll(valEl);
      done();
    }});

    // 12. Jungzigi pass + relay confirmed
    steps.push({ wait: T.VALIDATE_HOLD, run: function(done) {
      valEl.parentNode.removeChild(valEl);
      var jz = botMsg(
        '<div class="jz-label">' + botT('moderator', block.lang) + '</div>' +
        '<div class="jz-comment">' + esc(jungzigiComment(block, block.lang)) + '</div>' +
        '<br>' + botT('relay_confirm', block.lang, { slot: slotNum, total: SLOTS }),
        'jungzigi-msg'
      );
      showEl(jz, 10);
      autoScroll(jz);
      done();
    }});

    return steps;
  }

  /* ══════════════════════════════════════════════
     Build Steps: Fork (abbreviated)
     ══════════════════════════════════════════════ */
  function buildForkSteps(block) {
    var steps = [];

    // Fork divider
    steps.push({ wait: T.BETWEEN_MSG, run: function(done) {
      var div = el('div', 'fork-divider',
        '<span class="fork-divider-text">' + botT('meanwhile', block.lang, { flag: block.flag, city: esc(block.city) }) + '</span>' +
        '<span class="fork-badge">fork</span>'
      );
      addToFeed(div);
      showEl(div, 10);
      autoScroll(div);
      done();
    }});

    // Sender label
    steps.push({ wait: T.FORK_DIVIDER, run: function(done) {
      var lbl = senderLabel(block.firstName, block.flag, block.city);
      showEl(lbl, 10);
      done();
    }});

    // Photo (abbreviated — faster develop)
    var photoEl;
    steps.push({ wait: T.BETWEEN_MSG, run: function(done) {
      photoEl = photoMsg(block.photoPath, 'user', false);
      showEl(photoEl, 10);
      autoScroll(photoEl);
      // Faster develop for fork
      setTimeout(function() { developPhoto(photoEl); }, 600);
      done();
    }});

    // Caption — just show it (no typewriter for fork, faster)
    steps.push({ wait: T.FORK_PHOTO, run: function(done) {
      var capMsg = userMsg(esc(block.caption), 'caption-msg');
      showEl(capMsg, 10);
      autoScroll(capMsg);
      done();
    }});

    // Quick pass
    steps.push({ wait: T.FORK_CAPTION, run: function(done) {
      var jz = botMsg(
        '<div class="jz-label">' + botT('moderator', block.lang) + '</div>' +
        '<div class="jz-comment">' + esc(jungzigiComment(block, block.lang)) + '</div>',
        'jungzigi-msg'
      );
      showEl(jz, 10);
      autoScroll(jz);
      done();
    }});

    return steps;
  }

  /* ══════════════════════════════════════════════
     Group by Slot (same as live-chat)
     ══════════════════════════════════════════════ */
  function groupBySlot(tree) {
    if (!tree || !tree.chains) return [];
    var map = {};
    for (var ci = 0; ci < tree.chains.length; ci++) {
      var chain = tree.chains[ci];
      for (var bi = 0; bi < chain.blocks.length; bi++) {
        var b = chain.blocks[bi];
        // Skip Copy-on-Fork duplicates: fork chain blocks at or before forkSlot are copies
        if (chain.parentId && chain.forkSlot && b.slotIndex < chain.forkSlot) continue;
        if (!map[b.slotIndex]) map[b.slotIndex] = [];
        map[b.slotIndex].push({
          slotIndex: b.slotIndex, tzOffset: b.tzOffset,
          city: b.city, flag: b.flag, firstName: b.firstName,
          caption: b.caption, lang: b.lang || 'en',
          captionForNext: b.captionForNext || null,
          photoPath: '../../' + b.photoPath,
          createdAt: b.createdAt, chainId: chain.id,
          isFork: false // determined after sort
        });
      }
    }
    var keys = Object.keys(map).map(Number).sort(function(a, b) { return a - b; });
    return keys.map(function(k) {
      // Sort by upload time — first written is main, rest are forks
      var sorted = map[k].sort(function(a, b) {
        return (a.createdAt || '').localeCompare(b.createdAt || '');
      });
      for (var i = 0; i < sorted.length; i++) {
        sorted[i].isFork = i > 0;
      }
      return { slot: k, blocks: sorted };
    });
  }

  /* ══════════════════════════════════════════════
     Preload photos
     ══════════════════════════════════════════════ */
  function preloadSlotPhotos(sg) {
    for (var i = 0; i < sg.blocks.length; i++) {
      var img = new Image();
      img.src = sg.blocks[i].photoPath;
    }
  }

  /* ══════════════════════════════════════════════
     Auto-scroll — 유저 입력 시 OFF, 10초 무입력 시 다시 ON
     ══════════════════════════════════════════════ */
  var autoScrollEnabled = true;
  var scrollResumeTimer = null;

  function autoScroll(target) {
    if (!target || !autoScrollEnabled) return;
    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function onUserScroll() {
    autoScrollEnabled = false;
    clearTimeout(scrollResumeTimer);
    scrollResumeTimer = setTimeout(function() { autoScrollEnabled = true; }, 10000);
  }

  window.addEventListener('wheel', onUserScroll, { passive: true });
  window.addEventListener('touchstart', onUserScroll, { passive: true });

  /* ══════════════════════════════════════════════
     Clear feed
     ══════════════════════════════════════════════ */
  function clearFeed(cb) {
    feed.style.opacity = '0';
    routeFlags = [];
    setTimeout(function() {
      feed.innerHTML = '';
      feed.style.opacity = '1';
      window.scrollTo(0, 0);
      if (cb) cb();
    }, 550);
  }

  /* ══════════════════════════════════════════════
     Tree tabs
     ══════════════════════════════════════════════ */
  function renderTabs() {
    var tabsEl = document.getElementById('treeTabs');
    tabsEl.innerHTML = '';
    if (!state || !state.trees || state.trees.length <= 1) {
      tabsEl.classList.remove('visible');
      return;
    }
    tabsEl.classList.add('visible');
    for (var i = 0; i < state.trees.length; i++) {
      (function(idx) {
        var tab = document.createElement('button');
        tab.className = 'tree-tab' + (idx === treeIdx ? ' active' : '');
        tab.textContent = '#' + state.trees[idx].rootId;
        tab.onclick = function() {
          if (playing) return;
          treeIdx = idx;
          clearTimeout(timer);
          startTree();
        };
        tabsEl.appendChild(tab);
      })(i);
    }
  }

  /* ══════════════════════════════════════════════
     Mission intro
     ══════════════════════════════════════════════ */
  function localTime(createdAt, tzOffset) {
    if (!createdAt) return '';
    var utc = new Date(createdAt + (createdAt.indexOf('Z') < 0 ? 'Z' : ''));
    var local = new Date(utc.getTime() + tzOffset * 3600000);
    var h = local.getUTCHours();
    var m = local.getUTCMinutes();
    var ampm = h >= 12 ? 'PM' : 'AM';
    var h12 = h % 12 || 12;
    var mm = m < 10 ? '0' + m : m;
    var tz = tzOffset >= 0 ? 'UTC+' + tzOffset : 'UTC' + tzOffset;
    return h12 + ':' + mm + ' ' + ampm + ' (' + tz + ')';
  }

  function splitBtn(text) {
    var m = text.match(/^(\S+)\s+(.+)$/);
    if (m) return '<span class="btn-icon">' + m[1] + '</span><span class="btn-text">' + m[2] + '</span>';
    return text;
  }

  function formatMission(text) {
    var html = esc(text || 'Share a moment');
    html = html.replace(/\b(green)\b/gi, '<span class="mq-green">$1</span>');
    return html;
  }

  function renderMission(tree, cb) {
    var intro = el('div', 'mission-intro',
      '<div class="mission-label">mission</div>' +
      '<div class="mission-quote">' + formatMission(tree.mission) + '</div>' +
      '<div class="mission-meta">tree #' + tree.rootId + '</div>'
    );
    addToFeed(intro);
    requestAnimationFrame(function() { intro.classList.add('reveal'); });
    timer = setTimeout(cb, T.MISSION);
  }

  /* ══════════════════════════════════════════════
     End indicator
     ══════════════════════════════════════════════ */
  function showEndIndicator() {
    var end = el('div', 'end-indicator',
      '<div class="end-dot"></div>' +
      '<div class="end-text">' + botT('waiting', 'en') + '</div>'
    );
    addToFeed(end);
    autoScroll(end);
  }

  /* ══════════════════════════════════════════════
     Main Playback
     ══════════════════════════════════════════════ */
  function startTree() {
    clearTimeout(timer);
    playing = true;
    feed = document.getElementById('feed');

    if (!state || !state.trees || !state.trees.length) {
      document.getElementById('noData').style.display = '';
      playing = false;
      return;
    }
    document.getElementById('noData').style.display = 'none';

    var tree = state.trees[treeIdx];
    slotGroups = groupBySlot(tree);
    currentSlotIdx = 0;
    currentMission = tree.mission || '';
    currentMissionI18n = tree.missionI18n || {};
    currentStartHour = (typeof tree.startHour === 'number') ? tree.startHour : 12;

    clearFeed(function() {
      renderTabs();
      playNextSlot();
    });
  }

  function playNextSlot() {
    if (currentSlotIdx >= slotGroups.length) {
      showEndIndicator();
      playing = false;
      timer = setTimeout(function() {
        location.href = '../red/';
      }, T.TREE_PAUSE + 3000);
      return;
    }

    var sg = slotGroups[currentSlotIdx];
    var isOrigin = currentSlotIdx === 0;
    var mainBlock = sg.blocks[0];

    // Preload next slot's photos
    if (currentSlotIdx + 1 < slotGroups.length) {
      preloadSlotPhotos(slotGroups[currentSlotIdx + 1]);
    }

    // Find previous block for relay context
    var prevBlock = null;
    if (!isOrigin && currentSlotIdx > 0) {
      var prevSg = slotGroups[currentSlotIdx - 1];
      // Use main chain block (first non-fork)
      prevBlock = prevSg.blocks[0];
    }

    // Build step sequence
    var steps;
    if (isOrigin) {
      steps = buildOriginSteps(mainBlock, currentMission, slotGroups);
    } else {
      steps = buildRelaySteps(mainBlock, prevBlock, currentMission, sg.slot);
    }

    // If this slot has fork blocks, append fork steps
    for (var fi = 1; fi < sg.blocks.length; fi++) {
      if (sg.blocks[fi].isFork) {
        var forkSteps = buildForkSteps(sg.blocks[fi]);
        steps = steps.concat(forkSteps);
      }
    }

    // Play and advance
    playSequence(steps, function() {
      currentSlotIdx++;
      // More breathing room after origin (mission interstitial showing), less for relay
      var pause = isOrigin ? T.MISSION : T.BETWEEN_MSG * 3;
      timer = setTimeout(playNextSlot, pause);
    });
  }

  /* ══════════════════════════════════════════════
     Polling
     ══════════════════════════════════════════════ */
  function poll() {
    return fetch('../../green-relay.json?_=' + Date.now())
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (!data || data.updatedAt === lastUpdate) return;
        lastUpdate = data.updatedAt;
        var wasEmpty = !state || !state.trees || !state.trees.length;
        state = data;
        if (wasEmpty && state.trees && state.trees.length) {
          startTree();
        } else if (!playing && state.trees && state.trees.length) {
          // Check for new blocks while idle
          if (treeIdx >= state.trees.length) treeIdx = 0;
          var tree = state.trees[treeIdx];
          var newGroups = groupBySlot(tree);
          if (newGroups.length > slotGroups.length) {
            slotGroups = newGroups;
            // Resume playback from where we left off
            var end = document.querySelector('.end-indicator');
            if (end) end.parentNode.removeChild(end);
            playing = true;
            playNextSlot();
          }
          renderTabs();
        }
      })
      .catch(function() {});
  }

  /* ══════════════════════════════════════════════
     Init
     ══════════════════════════════════════════════ */
  feed = document.getElementById('feed');
  poll();
  setInterval(poll, POLL);
})();
</script>

<script>document.body.classList.add('swipe-fadein');requestAnimationFrame(function(){requestAnimationFrame(function(){document.body.classList.remove('swipe-fadein')});});</script>
<style>
.page-dots{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:9999;pointer-events:none}
.page-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.25);transition:background 0.3s}
.page-dot.active{background:rgba(255,255,255,0.85)}
</style>
<div class="page-dots">
  <div class="page-dot" id="dot0"></div>
  <div class="page-dot" id="dot1"></div>
  <div class="page-dot" id="dot2"></div>
  <div class="page-dot" id="dot3"></div>
</div>
<script>
(function(){
  var PAGES = ['../../','../pet/','../green/','../red/'];
  var path = location.pathname.replace(/\/$/, '').split('/').pop() || '';
  var cur = 0;
  if(path==='pet') cur=1;
  else if(path==='green') cur=2;
  else if(path==='red') cur=3;
  document.getElementById('dot'+cur).classList.add('active');
  var tx=0,ty=0,swiping=false;
  document.addEventListener('touchstart',function(e){
    tx=e.touches[0].clientX; ty=e.touches[0].clientY; swiping=true;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!swiping) return; swiping=false;
    var dx=e.changedTouches[0].clientX-tx;
    var dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)<60||Math.abs(dy)>Math.abs(dx)*0.8) return;
    var next=(cur+(dx<0?1:-1)+PAGES.length)%PAGES.length;
    sessionStorage.setItem('swipeNav','1'); location.href=PAGES[next];
  },{passive:true});
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'){var next=(cur+1)%PAGES.length; sessionStorage.setItem('swipeNav','1'); location.href=PAGES[next];}
    if(e.key==='ArrowLeft'){var next=(cur-1+PAGES.length)%PAGES.length; sessionStorage.setItem('swipeNav','1'); location.href=PAGES[next];}
  });
})();
</script>
